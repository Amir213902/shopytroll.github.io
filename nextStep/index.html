<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
</head>
<body>

    <header>
        <div class="main-data">
            <div class="circle">
                <div class="first-circle">
                    <div class="second-circle">
                        <div class="thired-circle">
                            <img src="images/icons8-галочка-48.svg">
                        </div>
                    </div>
                </div>
            </div>

            <div class="messages">
                <p class="transfer_complete">
                    Перевод доставлен
                </p>
                <h2 class="money" id="money"></h2>
                <h5 class="recipient" id="recipient"></h5>
            </div>
        </div>
    </header>

    <a class="close" href="../index.html">
        <img src="images/close.svg">
    </a>

    <div class="container">
        <div class="rows">
            <div class="row-1">
                <i class="icon-1"><img src="images/chek.svg"></i>
                <div class="content">
                    <h1 class="content-text">Сохранить чек</h1>
                </div>
            </div>
            <div class="row-1">
                <i class="icon-2"><img src="images/info.svg"></i>
                <div class="content">
                    <h1 class="content-text">Создать шаблон</h1>
                </div>
            </div>
            <div class="row-1">
                <i class="icon-3"><img src="images/star.svg"></i>
                <div class="content">
                    <h1 class="content-text">Перейти в диологи</h1>
                </div>
            </div>
            <div class="last-row-1">
                <i class="icon-4"><img src="images/messages.svg"></i>
                <div class="last-content">
                    <h1 class="last-content-text">Подробности операции</h1>
                    <i class="last-icon"><img src="images/arrow-bottom.svg"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-home">
        <h1 class="btn-home-text">Повторить</h1>
    </div>

    <footer>
        <div class="main-navigation">
            <i class="main-navigation-repeat">
                <img src="images/update.svg">
            </i>
        
            <h1 class="main-navigation-domen">
                Сбербанк Онлайн
            </h1>

            <i class="main-navigation-icon-option">
                <img src="images/option1.svg">
            </i>
        </div>

        <div class="bottom-navigation">
            <i class="bottom-navigation-alica-icon">
                <img src="images/alica.png">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/share.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/add.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/add2.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/menu.svg">
            </i>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
