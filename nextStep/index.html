<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="ShopyTroll">
    <meta name="apple-mobile-web-app-title" content="ShopyTroll">
    <meta name="theme-color" content="#121212">
    <meta name="msapplication-navbutton-color" content="#121212">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="icon" type="image/png" sizes="128x128" href="../images/27_big.png">
    <link rel="apple-touch-icon" type="image/png" sizes="128x128" href="../images/27_big.png">
</head>
<body>

    <header>
        <div class="main-data">
            <div class="circle">
                <div class="first-circle">
                    <div class="second-circle">
                        <div class="thired-circle">
                            <img src="images/icons8-галочка-48.svg">
                        </div>
                    </div>
                </div>
            </div>

            <div class="messages">
                <p class="transfer_complete">
                    Перевод доставлен
                </p>
                <h2 class="money" id="money"></h2>
                <h5 class="recipient" id="recipient"></h5>
            </div>
        </div>
    </header>

    <a class="close" href="https://amir213902.github.io/shopytroll.github.io/">
        <img src="images/close.svg">
    </a>

    <div class="container">
        <div class="rows">
            <div class="row-1">
                <i class="icon-1"><img src="images/chek.svg"></i>
                <div class="content">
                    <h1 class="content-text">Сохранить чек</h1>
                </div>
            </div>
            <div class="row-1">
                <i class="icon-2"><img src="images/star.svg"></i>
                <div class="content">
                    <h1 class="content-text">Создать шаблон</h1>
                </div>
            </div>
            <div class="row-1">
                <i class="icon-3"><img src="images/messages.svg"></i>
                <div class="content">
                    <h1 class="content-text">Перейти в диологи</h1>
                </div>
            </div>
            <div class="last-row-1">
                <i class="icon-4"><img src="images/info.svg"></i>
                <div class="last-content">
                    <h1 class="last-content-text">Подробности операции</h1>
                    <i class="last-icon"><img src="images/arrow-bottom.svg"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-home">
        <h1 class="btn-home-text">Повторить</h1>
    </div>

    <footer>
        <div class="main-navigation">
            <i class="main-navigation-repeat">
                <img src="images/update.svg">
            </i>
        
            <h1 class="main-navigation-domen">
                Сбербанк Онлайн
            </h1>

            <i class="main-navigation-icon-option">
                <img src="images/option1.svg">
            </i>
        </div>

        <div class="bottom-navigation">
            <i class="bottom-navigation-alica-icon">
                <img src="images/alica.png">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/share.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/add.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/add2.svg">
            </i>

            <i class="bottom-navigation-alica-icon">
                <img src="images/menu.svg">
            </i>
        </div>
    </footer>

    <script src="script.js"></script>
        <script>
        if ('serviceWorker' in navigator) {
         window.addEventListener('load', function() {  
           navigator.serviceWorker.register('../sw.js').then(
             function(registration) {
               // Registration was successful
               console.log('ServiceWorker registration successful with scope: ', registration.scope); },
             function(err) {
               // registration failed :(
               console.log('ServiceWorker registration failed: ', err);
             });
         });
        }
    </script>
</body>
</html>
